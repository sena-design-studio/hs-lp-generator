<div class="container lp-text-image">
  <div class="row d-flex align-items-center {% if module.image_position == 'left' %}flex-row-reverse{% endif %}">
    <div class="col-md-6 col-sm-12">
      <h2>{{ module.module_title }}</h2>
      {% inline_rich_text field="module_text" value="{{ module.module_text }}" %}
    </div>
    <div class="col-md-5 {% if module.image_position == 'left' %}me-auto{% else %}offset-md-1{% endif %} col-sm-12">
      {% if module.module_image.src %}
        <img
          src="{{ module.module_image.src|escape_url }}"
          alt="{{ module.module_image.alt|escape_attr }}"
          class="img-fluid"
          style="max-width:100%;height:auto;"
          loading="lazy">
      {% endif %}
    </div>
  </div>
</div>
