<footer class="container-fluid lp-footer">
  <div class="container">
    <div class="row d-flex align-items-center justify-content-between">
      <div class="col-md-4 col-sm-12">
        {% if module.logo.src %}
          <img
            src="{{ module.logo.src|escape_url }}"
            alt="{{ module.logo.alt|escape_attr }}"
            style="max-width:120px;height:auto;">
        {% endif %}
      </div>
      <div class="col-md-6 col-sm-12 text-md-end">
        <p>{{ module.copyright_text }}</p>
      </div>
    </div>
  </div>
</footer>
